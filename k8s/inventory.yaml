apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
  namespace: order-demo
  labels:
    app: inventory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
    spec:
      containers:
        - name: inventory
          image: ghcr.io/neuralnimbus22/order-demo-inventory:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: KAFKA_TOPIC
              value: order-placed
            - name: KAFKA_GROUP_ID
              value: inventory-service
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: inventory
  namespace: order-demo
  labels:
    app: inventory
spec:
  type: ClusterIP
  selector:
    app: inventory
  ports:
    - name: http
      port: 3003
      targetPort: 3003

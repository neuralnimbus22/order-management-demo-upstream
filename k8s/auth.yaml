apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: order-demo
  labels:
    app: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      # Short grace period — auth has no in-flight work that needs draining,
      # and a fast cascade is what we want for the demo. Even if the in-app
      # SIGTERM handler weren't present, Kubernetes would SIGKILL after 5s
      # instead of the default 30s.
      terminationGracePeriodSeconds: 5
      containers:
        - name: auth
          image: ghcr.io/neuralnimbus22/order-demo-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: PORT
              value: "3001"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: order-demo
  labels:
    app: auth
spec:
  type: ClusterIP
  selector:
    app: auth
  ports:
    - name: http
      port: 3001
      targetPort: 3001

apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  namespace: order-demo
  labels:
    app: order
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
        - name: order
          image: order-demo-order:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: AUTH_URL
              value: http://auth:3001
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: KAFKA_TOPIC
              value: order-placed
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: order
  namespace: order-demo
  labels:
    app: order
spec:
  type: ClusterIP
  selector:
    app: order
  ports:
    - name: http
      port: 3002
      targetPort: 3002
